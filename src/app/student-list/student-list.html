<h2 class="mb-4">
  Student List
  <a href="/students/addstudent" title="Add student">
    <i class="fa fa-user-plus interactivehover"></i>
  </a>
</h2>

<table>
  <thead>
    <tr>
      <th>Id</th>
      <th>Name</th>
      <th>Average</th>
    </tr>
  </thead>
  <tbody>
    @for (student of students; track student.id) {
  <tr>
    <td>{{ student.id }}</td>
    <td>{{ student.name }}</td>
    <td>{{ student.average }}</td>
  </tr>
}
  </tbody>
</table>
